# Base configs
baseurl: "/photography"
# baseurl: "" # Comment the above line and uncomment this to test the website locally
image_fulls_loc: "/images/fulls"
image_thumbs_loc: "/images/thumbs"
google_analytics: ""
exclude:
  - .DS_Store
  - .github/
  - .gitignore
  - .ruby-version
  - .travis.yml
  - Gemfile
  - Gemfile.lock
  - README.md
  - gulpfile.mjs
  - node_modules/
  - npmfile.js
  - package-lock.json
  - package.json

# UI configs
title: "Automotive Photography by JP Feliciano"
subtitle: "Capturing the details, motion, and craftsmanship behind every car."
author: "JP Feliciano"

header:
  title: "Automotive Photography"
  subtitle: "by JP Feliciano"

footer:
  name: "JP Feliciano"
  bio: "Automotive photographer based in Southern California, focused on creating clean, high-quality imagery that showcases every vehicle at its best."


social_urls:
  instagram: "https://www.instagram.com/felicijo.jpg/"
  linkedin: "https://www.linkedin.com/in/jp-feliciano/"

# Configure which exif data to display
# Tag is the actual exif tag, icon is a fontawesome icon. Use JSON notation without line breaks
exif: '[{"tag":"Model","icon":"fa fa-camera-retro"},{"tag":"FNumber","icon":"far fa-dot-circle"},{"tag":"ExposureTime","icon":"far fa-clock"},{"tag":"ISOSpeedRatings","icon":"fa fa-info-circle"}]'
